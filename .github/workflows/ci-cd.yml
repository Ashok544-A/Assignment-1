name: helloworld
on:
  push:
    branches:
      - main  
jobs:
  my-first-job:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Set up python
      uses: actions/setup-python@v5
      with: 
        python-version: "3.10"
    - name: revert change
      run: |
        git revert $a116b10bac4f5a1daf48e0a7938fe771ff3b1bc0
        
    - name: Run Hello World
      run: |
          python app.py
