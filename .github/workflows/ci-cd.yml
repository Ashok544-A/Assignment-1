name: helloworld
on:
  push:
    branches:
      - main  
jobs:
  my-job:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Set up python
      uses: actions/setup-python@v5
      with: 
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Hello World
      run: |
          python app.py
